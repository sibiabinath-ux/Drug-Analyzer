<!DOCTYPE html>
<html>
<head>
    <title>Drug Analysis Platform</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-dark text-light">

<div class="container py-5">

    <h1 class="text-center mb-4">🧪 Drug Analysis Platform</h1>

    <div class="card p-4 mb-4 shadow-sm">
        <div class="d-flex justify-content-center">
            <input type="text" id="drugInput" class="form-control w-50 me-2" placeholder="Enter drug name">
            <button onclick="analyzeDrug()" class="btn btn-primary">Analyze</button>
        </div>
    </div>

    <div class="card p-4 mb-4 text-center shadow-sm">
        <h5>3D Molecular Structure</h5>
        <div id="viewer"></div>
    </div>

    <div id="result"></div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
